<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Browser Space Engine</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:12px;
border-radius:8px;
}

#ui input{
width:150px;
}

</style>

</head>

<body>

<div id="ui">

<b>Universe Engine 🚀</b><br><br>

Simulation Speed<br>
<input id="speed" type="range" min="0.1" max="5" step="0.1" value="1"><br><br>

Cosmic Time: <span id="time">0</span> BY<br><br>

<button onclick="toggleShip()">Toggle Spaceship Mode</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

let scene = new THREE.Scene()

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
10000
)

camera.position.z = 200

let renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

let controls = new THREE.OrbitControls(camera,renderer.domElement)

let loader = new THREE.TextureLoader()

/* ---------------------
STARFIELD SKY
--------------------- */

let skyTex = loader.load(
"https://threejs.org/examples/textures/galaxy_starfield.png"
)

let skyGeo = new THREE.SphereGeometry(5000,64,64)

let skyMat = new THREE.MeshBasicMaterial({
map:skyTex,
side:THREE.BackSide
})

let sky = new THREE.Mesh(skyGeo,skyMat)

scene.add(sky)

/* ---------------------
GALAXY PARTICLES
--------------------- */

const count = 200000

let geo = new THREE.BufferGeometry()

let positions = new Float32Array(count*3)

let velocities = []

let colors = new Float32Array(count*3)

for(let i=0;i<count;i++){

positions[i*3]=(Math.random()-0.5)*20
positions[i*3+1]=(Math.random()-0.5)*20
positions[i*3+2]=(Math.random()-0.5)*20

let v = new THREE.Vector3(
Math.random()-0.5,
Math.random()-0.5,
Math.random()-0.5
)

v.multiplyScalar(0.5)

velocities.push(v)

let color = new THREE.Color()

color.setHSL(Math.random(),1,0.7)

colors[i*3]=color.r
colors[i*3+1]=color.g
colors[i*3+2]=color.b

}

geo.setAttribute("position",
new THREE.BufferAttribute(positions,3))

geo.setAttribute("color",
new THREE.BufferAttribute(colors,3))

let mat = new THREE.PointsMaterial({

size:0.35,
vertexColors:true,
blending:THREE.AdditiveBlending,
transparent:true,
depthWrite:false

})

let stars = new THREE.Points(geo,mat)

scene.add(stars)

/* ---------------------
BLACK HOLES
--------------------- */

let blackHoles=[]

for(let i=0;i<4;i++){

let g = new THREE.SphereGeometry(5,32,32)

let m = new THREE.MeshBasicMaterial({color:0x000000})

let bh = new THREE.Mesh(g,m)

bh.position.set(
(Math.random()-0.5)*400,
(Math.random()-0.5)*400,
(Math.random()-0.5)*400
)

scene.add(bh)

blackHoles.push(bh)

/* accretion disk */

let ringGeo = new THREE.RingGeometry(7,15,32)

let ringMat = new THREE.MeshBasicMaterial({
color:0xffaa00,
side:THREE.DoubleSide
})

let disk = new THREE.Mesh(ringGeo,ringMat)

disk.rotation.x = Math.PI/2

bh.add(disk)

}

/* ---------------------
SUPERNOVA SYSTEM
--------------------- */

let explosions=[]

function createSupernova(){

let geo = new THREE.SphereGeometry(1,16,16)

let mat = new THREE.MeshBasicMaterial({
color:0xffddaa
})

let star = new THREE.Mesh(geo,mat)

star.position.set(
(Math.random()-0.5)*300,
(Math.random()-0.5)*300,
(Math.random()-0.5)*300
)

scene.add(star)

explosions.push({
mesh:star,
size:1
})

}

setInterval(createSupernova,5000)

/* ---------------------
SOLAR SYSTEM
--------------------- */

let sunGeo = new THREE.SphereGeometry(8,32,32)

let sunMat = new THREE.MeshBasicMaterial({color:0xffcc00})

let sun = new THREE.Mesh(sunGeo,sunMat)

sun.position.set(120,0,0)

scene.add(sun)

let planetGeo = new THREE.SphereGeometry(3,32,32)

let planetMat = new THREE.MeshBasicMaterial({color:0x3399ff})

let earth = new THREE.Mesh(planetGeo,planetMat)

scene.add(earth)

let angle = 0

/* ---------------------
SPACESHIP
--------------------- */

let shipGeo = new THREE.ConeGeometry(2,6,16)

let shipMat = new THREE.MeshBasicMaterial({color:0xffffff})

let ship = new THREE.Mesh(shipGeo,shipMat)

ship.rotation.x = Math.PI/2

scene.add(ship)

let shipMode=false

function toggleShip(){

shipMode=!shipMode

}

/* ---------------------
KEYBOARD CONTROLS
--------------------- */

let keys={}

window.addEventListener("keydown",e=>{
keys[e.key]=true
})

window.addEventListener("keyup",e=>{
keys[e.key]=false
})

/* ---------------------
SIMULATION LOOP
--------------------- */

let time=0

function animate(){

requestAnimationFrame(animate)

let speed=parseFloat(
document.getElementById("speed").value
)

time+=0.002*speed

document.getElementById("time").innerText=
(time*13.8).toFixed(2)

/* particle motion */

let pos = geo.attributes.position.array

for(let i=0;i<count;i++){

let index=i*3

pos[index]+=velocities[i].x
pos[index+1]+=velocities[i].y
pos[index+2]+=velocities[i].z

/* gravity from black holes */

for(let bh of blackHoles){

let dx=bh.position.x-pos[index]
let dy=bh.position.y-pos[index+1]
let dz=bh.position.z-pos[index+2]

let dist=Math.sqrt(dx*dx+dy*dy+dz*dz)+1

let force=0.01/(dist*dist)

velocities[i].x+=dx*force
velocities[i].y+=dy*force
velocities[i].z+=dz*force

}

}

/* supernova expansion */

for(let e of explosions){

e.size+=0.3

e.mesh.scale.set(e.size,e.size,e.size)

if(e.size>20){

scene.remove(e.mesh)

}

}

/* planet orbit */

angle+=0.01

earth.position.x = sun.position.x + Math.cos(angle)*25
earth.position.z = Math.sin(angle)*25

/* spaceship */

if(shipMode){

controls.enabled=false

if(keys["w"]) ship.position.z-=2
if(keys["s"]) ship.position.z+=2
if(keys["a"]) ship.position.x-=2
if(keys["d"]) ship.position.x+=2

camera.position.copy(ship.position)
camera.position.z+=10

}else{

controls.enabled=true

}

/* update */

geo.attributes.position.needsUpdate=true

controls.update()

renderer.render(scene,camera)

}

animate()

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight

camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
