<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Procedural Universe 2.0</title>
<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial;}
#ui{
position:absolute;top:10px;left:10px;color:white;
background:rgba(0,0,0,0.6);padding:10px;border-radius:6px;
}
</style>
</head>
<body>
<div id="ui">
<b>Procedural Universe 🌌</b><br>
WASD = Fly<br>
Shift = Warp<br>
Click = Look<br>
Space = Jump / Land<br>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// =======================
// Scene & Camera
// =======================
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,200000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// =======================
// Spaceship / Player
// =======================
let ship = new THREE.Object3D();
scene.add(ship);
ship.add(camera);
let keys = {};
let warp = false;
let onPlanet = false;

// keyboard
window.addEventListener("keydown",e=>{keys[e.key]=true;if(e.key==="Shift") warp=true; if(e.key===" ") landOrJump();});
window.addEventListener("keyup",e=>{keys[e.key]=false;if(e.key==="Shift") warp=false;});

// mouse look
let yaw=0,pitch=0;
document.body.addEventListener("click",()=>document.body.requestPointerLock());
document.body.addEventListener("mousemove",e=>{
  if(document.pointerLockElement){
    yaw-=e.movementX*0.002; pitch-=e.movementY*0.002;
    pitch=Math.max(-1.5,Math.min(1.5,pitch));
    ship.rotation.y=yaw; camera.rotation.x=pitch;
  }
});

// =======================
// Lighting
// =======================
let ambient = new THREE.AmbientLight(0xffffff,0.6); scene.add(ambient);
let directional = new THREE.DirectionalLight(0xffffff,0.8);
directional.position.set(1,1,0); scene.add(directional);

// =======================
// Universe Generation
// =======================
let systems = {};
const GRID_SIZE=2000;

function seededRandom(seed){return Math.sin(seed)*10000-Math.floor(Math.sin(seed)*10000);}
function createSystem(id,x,z){
  let group = new THREE.Group();
  // star
  let star = new THREE.Mesh(new THREE.SphereGeometry(20,32,32), new THREE.MeshBasicMaterial({color:new THREE.Color().setHSL(Math.random(),1,0.6)}));
  group.add(star);
  // planets
  let planetCount = Math.floor(Math.random()*6)+1;
  for(let i=0;i<planetCount;i++){
    let planet = createPlanet(i);
    group.add(planet);
  }
  group.position.set(x,0,z);
  scene.add(group);
  systems[id]=group;
}

// =======================
// Planet Creation
// =======================
function createPlanet(index){
  let geo = new THREE.SphereGeometry(5+index*2,64,64);
  let mat = new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(Math.random(),1,0.5),flatShading:false,metalness:0,roughness:1});
  let planet = new THREE.Mesh(geo,mat);
  planet.distance = 60 + index*40;
  planet.angle = Math.random()*Math.PI*2;
  // ring for some planets
  if(Math.random()<0.3){
    let ringGeo = new THREE.RingGeometry(planet.distance-3,planet.distance+5,32);
    let ringMat = new THREE.MeshBasicMaterial({color:0xbbbbbb,side:THREE.DoubleSide});
    let ring = new THREE.Mesh(ringGeo,ringMat);
    ring.rotation.x=Math.PI/2;
    planet.add(ring);
  }
  return planet;
}

// =======================
// Planet Landing
// =======================
let currentPlanet=null;
function landOrJump(){
  if(onPlanet){
    ship.position.y+=50; onPlanet=false;
  }else{
    // find nearest planet
    let nearest=null; let minDist=Infinity;
    for(let id in systems){
      let sys=systems[id];
      sys.children.forEach(obj=>{
        if(obj.distance){
          let dx=obj.getWorldPosition(new THREE.Vector3()).x-ship.position.x;
          let dz=obj.getWorldPosition(new THREE.Vector3()).z-ship.position.z;
          let dist=Math.sqrt(dx*dx+dz*dz);
          if(dist<minDist){minDist=dist; nearest=obj;}
        }
      });
    }
    if(nearest && minDist<planet.distance+20){
      // land
      let pos=nearest.getWorldPosition(new THREE.Vector3());
      ship.position.set(pos.x,pos.y+6,pos.z);
      onPlanet=true; currentPlanet=nearest;
    }
  }
}

// =======================
// Asteroid Belts
// =======================
let asteroids=[];
function createAsteroidBelt(planet){
  let belt = new THREE.Group();
  for(let i=0;i<50;i++){
    let geo = new THREE.SphereGeometry(Math.random()*1.5+0.5,8,8);
    let mat = new THREE.MeshStandardMaterial({color:0x888888});
    let rock = new THREE.Mesh(geo,mat);
    let angle=Math.random()*Math.PI*2;
    let dist=planet.distance+20+Math.random()*20;
    rock.position.set(Math.cos(angle)*dist, (Math.random()-0.5)*4, Math.sin(angle)*dist);
    belt.add(rock);
    asteroids.push({mesh:rock,planet:planet,angle:angle,dist:dist});
  }
  scene.add(belt);
}
for(let i=0;i<5;i++){createAsteroidBelt({distance:60+i*40});}

// =======================
// Galaxy Update
// =======================
function updateUniverse(){
  let gx=Math.floor(ship.position.x/GRID_SIZE);
  let gz=Math.floor(ship.position.z/GRID_SIZE);
  for(let x=-2;x<=2;x++){
    for(let z=-2;z<=2;z++){
      let id=(gx+x)+"_"+(gz+z);
      if(!systems[id]) createSystem(id,(gx+x)*GRID_SIZE,(gz+z)*GRID_SIZE);
    }
  }
}

// =======================
// Animation Loop
// =======================
function animate(){
  requestAnimationFrame(animate);
  let speed = warp?200:20;
  if(!onPlanet){
    if(keys["w"]) ship.translateZ(-speed);
    if(keys["s"]) ship.translateZ(speed);
    if(keys["a"]) ship.translateX(-speed);
    if(keys["d"]) ship.translateX(speed);
  }
  updateUniverse();
  // planet orbits
  for(let id in systems){
    let sys=systems[id];
    sys.children.forEach(obj=>{
      if(obj.distance){
        obj.angle+=0.01;
        obj.position.x=Math.cos(obj.angle)*obj.distance;
        obj.position.z=Math.sin(obj.angle)*obj.distance;
      }
    });
  }
  // asteroid belts rotation
  asteroids.forEach(a=>{
    a.angle+=0.01;
    a.mesh.position.x=Math.cos(a.angle)*a.dist;
    a.mesh.position.z=Math.sin(a.angle)*a.dist;
  });
  renderer.render(scene,camera);
}
animate();

// =======================
// Resize
// =======================
window.addEventListener("resize",()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>
</body>
</html>
