<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Procedural Universe 4.0</title>
<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial;}
#ui{
position:absolute;top:10px;left:10px;color:white;
background:rgba(0,0,0,0.6);padding:10px;border-radius:6px;
}
#tools{
position:absolute;bottom:10px;left:10px;color:white;
background:rgba(0,0,0,0.6);padding:10px;border-radius:6px;
}
</style>
</head>
<body>
<div id="ui"><b>Procedural Universe 4.0 🌌</b><br>
WASD = Fly / Walk | Shift = Warp | Space = Jump / Land<br>
Click = Mouse Look
</div>
<div id="tools"><b>Tools / Crafting:</b> Pickaxe (E), Scanner (Q)</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

// ====================
// Scene & Camera
// ====================
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ====================
// Player / FPS Controls
// ====================
let player = new THREE.Object3D();
scene.add(player);
player.add(camera);
let keys = {}, warp=false, onPlanet=false;

// --------------------
// Keyboard / Mouse
// --------------------
window.addEventListener("keydown", e => { keys[e.key]=true; if(e.key==="Shift") warp=true; if(e.key===" ") landOrJump(); });
window.addEventListener("keyup", e => { keys[e.key]=false; if(e.key==="Shift") warp=false; });

let yaw=0,pitch=0;
document.body.addEventListener("click",()=>document.body.requestPointerLock());
document.body.addEventListener("mousemove", e => {
  if(document.pointerLockElement){
    yaw -= e.movementX*0.002; pitch -= e.movementY*0.002;
    pitch = Math.max(-1.5,Math.min(1.5,pitch));
    player.rotation.y = yaw; camera.rotation.x = pitch;
  }
});

// ====================
// Lighting
// ====================
scene.add(new THREE.AmbientLight(0xffffff,0.6));
let sun = new THREE.DirectionalLight(0xffffff,0.8);
sun.position.set(1,1,0);
scene.add(sun);

// ====================
// Universe Data
// ====================
let galaxies = [];
const GALAXY_COUNT = 3;
const SYSTEM_GRID = 10000;

// Generate galaxies
for(let g=0;g<GALAXY_COUNT;g++){
  let galaxy = {id:g, position:new THREE.Vector3(Math.random()*500000-250000,0,Math.random()*500000-250000), systems:[]};
  galaxies.push(galaxy);
}

// Create star systems
function createSystem(galaxy, id, x, z){
  let group = new THREE.Group();
  let star = new THREE.Mesh(new THREE.SphereGeometry(30,32,32),
    new THREE.MeshBasicMaterial({color:new THREE.Color().setHSL(Math.random(),1,0.6)}));
  group.add(star);
  let planetCount = Math.floor(Math.random()*4)+1;
  for(let i=0;i<planetCount;i++){
    let planet = createPlanet(i);
    group.add(planet);
  }
  group.position.set(x,y=0,z);
  scene.add(group);
  galaxy.systems.push(group);
  return group;
}

// --------------------
// Planet Creation with Terrain / Atmosphere / Moons
// --------------------
function createPlanet(index){
  let geo = new THREE.SphereGeometry(5+index*3,128,128);
  // Terrain perturbation
  for(let i=0;i<geo.vertices.length;i++){
    geo.vertices[i].multiplyScalar(1 + Math.random()*0.05);
  }
  geo.computeVertexNormals();
  let mat = new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(Math.random(),1,0.5),roughness:1,metalness:0});
  let planet = new THREE.Mesh(geo,mat);
  planet.distance = 80 + index*50; planet.angle = Math.random()*Math.PI*2;

  // Atmosphere
  let atmGeo = new THREE.SphereGeometry(geo.parameters.radius*1.05,64,64);
  let atmMat = new THREE.MeshPhongMaterial({color:0x44aaff,transparent:true,opacity:0.25,side:THREE.DoubleSide});
  planet.add(new THREE.Mesh(atmGeo, atmMat));

  // Moons
  planet.moons=[];
  let moonCount = Math.floor(Math.random()*3);
  for(let i=0;i<moonCount;i++){
    let mGeo = new THREE.SphereGeometry(planet.geometry.parameters.radius*0.3,32,32);
    let mMat = new THREE.MeshStandardMaterial({color:0x888888});
    let moon = new THREE.Mesh(mGeo,mMat);
    moon.distance = planet.geometry.parameters.radius*2 + i*5;
    moon.angle = Math.random()*Math.PI*2;
    planet.moons.push(moon);
    planet.add(moon);
  }
  return planet;
}

// ====================
// Galaxy Collision Simulation
// ====================
function applyGalaxyGravity(){
  for(let i=0;i<galaxies.length;i++){
    for(let j=i+1;j<galaxies.length;j++){
      let dx = galaxies[j].position.x - galaxies[i].position.x;
      let dz = galaxies[j].position.z - galaxies[i].position.z;
      let distSq = dx*dx+dz*dz+0.01;
      let force = 50 / distSq;
      galaxies[i].position.x += dx*force;
      galaxies[i].position.z += dz*force;
      galaxies[j].position.x -= dx*force;
      galaxies[j].position.z -= dz*force;
      // Move systems inside galaxy accordingly
      galaxies[i].systems.forEach(s=>{s.position.x += dx*force; s.position.z += dz*force;});
      galaxies[j].systems.forEach(s=>{s.position.x -= dx*force; s.position.z -= dz*force;});
    }
  }
}

// ====================
// Planet Landing / FPS Exploration
// ====================
function landOrJump(){
  if(onPlanet){player.position.y+=50; onPlanet=false;}
  else{
    let nearest=null; let minDist=Infinity;
    galaxies.forEach(g=>{
      g.systems.forEach(sys=>{
        sys.children.forEach(obj=>{
          if(obj.distance){
            let pos=obj.getWorldPosition(new THREE.Vector3());
            let dist=player.position.distanceTo(pos);
            if(dist<obj.distance+20){nearest=obj; minDist=dist;}
          }
        });
      });
    });
    if(nearest){
      let pos=nearest.getWorldPosition(new THREE.Vector3());
      player.position.set(pos.x,pos.y+6,pos.z);
      onPlanet=true;
    }
  }
}

// ====================
// Animate Loop
// ====================
function animate(){
  requestAnimationFrame(animate);
  let speed = warp?300:20;
  if(!onPlanet){
    if(keys["w"]) player.translateZ(-speed);
    if(keys["s"]) player.translateZ(speed);
    if(keys["a"]) player.translateX(-speed);
    if(keys["d"]) player.translateX(speed);
  }

  // Orbits and moons
  galaxies.forEach(g=>{
    g.systems.forEach(sys=>{
      sys.children.forEach(obj=>{
        if(obj.distance){
          obj.angle+=0.01;
          obj.position.x=Math.cos(obj.angle)*obj.distance;
          obj.position.z=Math.sin(obj.angle)*obj.distance;
          if(obj.moons){
            obj.moons.forEach(m=>{
              m.angle+=0.02;
              m.position.x=Math.cos(m.angle)*m.distance;
              m.position.z=Math.sin(m.angle)*m.distance;
            });
          }
        }
      });
    });
  });

  applyGalaxyGravity();

  renderer.render(scene,camera);
}
animate();

// ====================
// Resize
// ====================
window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
