<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Space Engine</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:8px;
}
</style>

</head>

<body>

<div id="ui">
<b>Mini Space Engine 🚀</b><br>
WASD = Fly<br>
Shift = Warp Drive<br>
Mouse = Look<br>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene = new THREE.Scene()

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
200000
)

let renderer = new THREE.WebGLRenderer({antialias:true})

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

camera.position.z=100

/* --------------------
STARFIELD
-------------------- */

function createGalaxy(){

let count=200000

let geo=new THREE.BufferGeometry()

let pos=new Float32Array(count*3)

for(let i=0;i<count;i++){

let r=Math.random()*2000
let angle=r*0.05

pos[i*3]=Math.cos(angle)*r+(Math.random()-0.5)*50
pos[i*3+1]=(Math.random()-0.5)*200
pos[i*3+2]=Math.sin(angle)*r+(Math.random()-0.5)*50

}

geo.setAttribute("position",
new THREE.BufferAttribute(pos,3))

let mat=new THREE.PointsMaterial({

size:2,
color:0xffffff

})

let stars=new THREE.Points(geo,mat)

scene.add(stars)

}

createGalaxy()

/* --------------------
BLACK HOLE
-------------------- */

let bhGeo=new THREE.SphereGeometry(30,64,64)

let bhMat=new THREE.MeshBasicMaterial({color:0x000000})

let blackHole=new THREE.Mesh(bhGeo,bhMat)

blackHole.position.set(0,0,-1000)

scene.add(blackHole)

/* lensing glow */

let glowGeo=new THREE.SphereGeometry(60,32,32)

let glowMat=new THREE.MeshBasicMaterial({

color:0x5500ff,
transparent:true,
opacity:0.2

})

let glow=new THREE.Mesh(glowGeo,glowMat)

blackHole.add(glow)

/* --------------------
PLANET SYSTEM
-------------------- */

let sun=new THREE.Mesh(
new THREE.SphereGeometry(40,32,32),
new THREE.MeshBasicMaterial({color:0xffcc00})
)

sun.position.set(500,0,-1500)

scene.add(sun)

function createPlanet(distance,color){

let planet=new THREE.Mesh(
new THREE.SphereGeometry(10,32,32),
new THREE.MeshPhongMaterial({color:color})
)

planet.distance=distance
planet.angle=Math.random()*Math.PI*2

sun.add(planet)

return planet

}

let planets=[]

planets.push(createPlanet(120,0x3399ff))
planets.push(createPlanet(200,0xff5533))
planets.push(createPlanet(300,0x99ffcc))

/* planet rings */

let ringGeo=new THREE.RingGeometry(15,25,32)

let ringMat=new THREE.MeshBasicMaterial({
color:0xbbbbbb,
side:THREE.DoubleSide
})

let ring=new THREE.Mesh(ringGeo,ringMat)

ring.rotation.x=Math.PI/2

planets[1].add(ring)

/* light */

let light=new THREE.PointLight(0xffffff,2,5000)

sun.add(light)

/* --------------------
SPACESHIP
-------------------- */

let ship=new THREE.Object3D()

scene.add(ship)

camera.parent=ship

ship.add(camera)

let speed=2

let warp=false

let keys={}

window.addEventListener("keydown",e=>{

keys[e.key]=true

if(e.key==="Shift") warp=true

})

window.addEventListener("keyup",e=>{

keys[e.key]=false

if(e.key==="Shift") warp=false

})

/* --------------------
MOUSE LOOK
-------------------- */

let yaw=0
let pitch=0

document.body.addEventListener("mousemove",e=>{

yaw-=e.movementX*0.002
pitch-=e.movementY*0.002

pitch=Math.max(-1.5,Math.min(1.5,pitch))

ship.rotation.y=yaw
camera.rotation.x=pitch

})

document.body.addEventListener("click",()=>{

document.body.requestPointerLock()

})

/* --------------------
ANIMATION
-------------------- */

function animate(){

requestAnimationFrame(animate)

let moveSpeed=warp?40:5

if(keys["w"]) ship.translateZ(-moveSpeed)
if(keys["s"]) ship.translateZ(moveSpeed)
if(keys["a"]) ship.translateX(-moveSpeed)
if(keys["d"]) ship.translateX(moveSpeed)

/* planet orbit */

planets.forEach(p=>{

p.angle+=0.002

p.position.x=Math.cos(p.angle)*p.distance
p.position.z=Math.sin(p.angle)*p.distance

})

renderer.render(scene,camera)

}

animate()

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight

camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
