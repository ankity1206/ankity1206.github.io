<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced Universe Simulator</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#panel{
position:absolute;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:12px;
border-radius:8px;
}

#panel input{
width:160px;
}

</style>

</head>

<body>

<div id="panel">
<b>Universe Simulator 🌌</b><br><br>

Simulation Speed<br>
<input id="speed" type="range" min="0.1" max="5" step="0.1" value="1"><br><br>

Cosmic Time: <span id="time">0</span> Billion Years
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

let scene = new THREE.Scene()

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
5000
)

camera.position.z = 120

let renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

let controls = new THREE.OrbitControls(camera,renderer.domElement)

let loader = new THREE.TextureLoader()

/* -------------------
SPACE BACKGROUND
------------------- */

let spaceTexture = loader.load(
"https://threejs.org/examples/textures/galaxy_starfield.png"
)

let skyGeo = new THREE.SphereGeometry(2000,64,64)

let skyMat = new THREE.MeshBasicMaterial({
map:spaceTexture,
side:THREE.BackSide
})

let sky = new THREE.Mesh(skyGeo,skyMat)

scene.add(sky)

/* -------------------
NEBULA CLOUDS
------------------- */

let nebulaTexture = loader.load(
"https://threejs.org/examples/textures/lensflare/lensflare0.png"
)

for(let i=0;i<30;i++){

let geo = new THREE.SpriteMaterial({
map:nebulaTexture,
color:0xff88ff,
transparent:true,
opacity:0.2
})

let sprite = new THREE.Sprite(geo)

sprite.position.set(
(Math.random()-0.5)*800,
(Math.random()-0.5)*800,
(Math.random()-0.5)*800
)

let scale = Math.random()*200+100

sprite.scale.set(scale,scale,1)

scene.add(sprite)

}

/* -------------------
BLACK HOLES
------------------- */

let blackHoles = []

for(let i=0;i<3;i++){

let geo = new THREE.SphereGeometry(5,32,32)

let mat = new THREE.MeshBasicMaterial({
color:0x000000
})

let hole = new THREE.Mesh(geo,mat)

hole.position.set(
(Math.random()-0.5)*200,
(Math.random()-0.5)*200,
(Math.random()-0.5)*200
)

scene.add(hole)

blackHoles.push(hole)

}

/* -------------------
PARTICLES (MATTER)
------------------- */

const particleCount = 100000

let geometry = new THREE.BufferGeometry()

let positions = new Float32Array(particleCount*3)

let velocities = []

let colors = new Float32Array(particleCount*3)

for(let i=0;i<particleCount;i++){

positions[i*3]=0
positions[i*3+1]=0
positions[i*3+2]=0

let v = new THREE.Vector3(
Math.random()-0.5,
Math.random()-0.5,
Math.random()-0.5
)

v.normalize()
v.multiplyScalar(Math.random()*3)

velocities.push(v)

let color = new THREE.Color()

color.setHSL(Math.random(),1,0.7)

colors[i*3]=color.r
colors[i*3+1]=color.g
colors[i*3+2]=color.b

}

geometry.setAttribute(
"position",
new THREE.BufferAttribute(positions,3)
)

geometry.setAttribute(
"color",
new THREE.BufferAttribute(colors,3)
)

let material = new THREE.PointsMaterial({

size:0.25,
vertexColors:true,
transparent:true,
blending:THREE.AdditiveBlending,
depthWrite:false

})

let particles = new THREE.Points(geometry,material)

scene.add(particles)

/* -------------------
BIG BANG SOUND
------------------- */

function playBang(){

let ctx = new (window.AudioContext||window.webkitAudioContext)()

let osc = ctx.createOscillator()

let gain = ctx.createGain()

osc.frequency.value = 80

osc.type="sawtooth"

gain.gain.setValueAtTime(1,ctx.currentTime)

gain.gain.exponentialRampToValueAtTime(
0.0001,
ctx.currentTime+3
)

osc.connect(gain)

gain.connect(ctx.destination)

osc.start()

osc.stop(ctx.currentTime+3)

}

playBang()

/* -------------------
SIMULATION
------------------- */

let time = 0

function animate(){

requestAnimationFrame(animate)

let speed = parseFloat(
document.getElementById("speed").value
)

time += 0.002 * speed

document.getElementById("time").innerText =
(time*13.8).toFixed(2)

let pos = geometry.attributes.position.array

for(let i=0;i<particleCount;i++){

let index = i*3

pos[index]+=velocities[i].x*speed
pos[index+1]+=velocities[i].y*speed
pos[index+2]+=velocities[i].z*speed

/* black hole gravity */

for(let h of blackHoles){

let dx = h.position.x-pos[index]
let dy = h.position.y-pos[index+1]
let dz = h.position.z-pos[index+2]

let dist = Math.sqrt(dx*dx+dy*dy+dz*dz)+1

let force = 0.02/(dist*dist)

velocities[i].x += dx*force
velocities[i].y += dy*force
velocities[i].z += dz*force

}

/* galaxy spiral effect */

velocities[i].x += -pos[index+1]*0.00001
velocities[i].y += pos[index]*0.00001

}

geometry.attributes.position.needsUpdate=true

particles.rotation.y += 0.0003

controls.update()

renderer.render(scene,camera)

}

animate()

/* -------------------
RESIZE
------------------- */

window.addEventListener("resize",()=>{

camera.aspect =
window.innerWidth/window.innerHeight

camera.updateProjectionMatrix()

renderer.setSize(
window.innerWidth,
window.innerHeight
)

})

</script>

</body>
</html>
