<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Procedural Universe</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:6px;
}
</style>

</head>

<body>

<div id="ui">
<b>Procedural Universe 🌌</b><br>
WASD = Fly<br>
Shift = Warp<br>
Mouse = Look<br>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene = new THREE.Scene()

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000000
)

let renderer = new THREE.WebGLRenderer()

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

/* -------------------
SPACESHIP
------------------- */

let ship = new THREE.Object3D()
scene.add(ship)

ship.add(camera)

let keys={}
let warp=false

window.addEventListener("keydown",e=>{
keys[e.key]=true
if(e.key==="Shift") warp=true
})

window.addEventListener("keyup",e=>{
keys[e.key]=false
if(e.key==="Shift") warp=false
})

/* -------------------
MOUSE LOOK
------------------- */

let yaw=0
let pitch=0

document.body.addEventListener("click",()=>{
document.body.requestPointerLock()
})

document.body.addEventListener("mousemove",e=>{

if(document.pointerLockElement){

yaw -= e.movementX*0.002
pitch -= e.movementY*0.002

pitch = Math.max(-1.5,Math.min(1.5,pitch))

ship.rotation.y = yaw
camera.rotation.x = pitch

}

})

/* -------------------
STAR SYSTEM STORAGE
------------------- */

let systems={}

/* deterministic random */

function seededRandom(seed){

let x = Math.sin(seed)*10000
return x - Math.floor(x)

}

/* -------------------
CREATE STAR SYSTEM
------------------- */

function createSystem(id,x,z){

let group = new THREE.Group()

/* star */

let starColor = new THREE.Color().setHSL(Math.random(),1,0.6)

let star = new THREE.Mesh(

new THREE.SphereGeometry(20,32,32),

new THREE.MeshBasicMaterial({color:starColor})

)

group.add(star)

/* planets */

let planetCount = Math.floor(Math.random()*6)+1

for(let i=0;i<planetCount;i++){

let planet = new THREE.Mesh(

new THREE.SphereGeometry(5,16,16),

new THREE.MeshPhongMaterial({
color:new THREE.Color().setHSL(Math.random(),1,0.5)
})

)

planet.distance = 60 + i*40
planet.angle = Math.random()*Math.PI*2

group.add(planet)

}

group.position.set(x,0,z)

scene.add(group)

systems[id]=group

}

/* -------------------
LIGHT
------------------- */

let light = new THREE.AmbientLight(0xffffff,0.6)
scene.add(light)

/* -------------------
GENERATE SYSTEMS NEAR PLAYER
------------------- */

function updateUniverse(){

let gridSize=2000

let gx = Math.floor(ship.position.x/gridSize)
let gz = Math.floor(ship.position.z/gridSize)

for(let x=-2;x<=2;x++){

for(let z=-2;z<=2;z++){

let id=(gx+x)+"_"+(gz+z)

if(!systems[id]){

createSystem(
id,
(gx+x)*gridSize,
(gz+z)*gridSize
)

}

}

}

}

/* -------------------
ANIMATION
------------------- */

function animate(){

requestAnimationFrame(animate)

let speed = warp ? 200 : 20

if(keys["w"]) ship.translateZ(-speed)
if(keys["s"]) ship.translateZ(speed)
if(keys["a"]) ship.translateX(-speed)
if(keys["d"]) ship.translateX(speed)

/* update star systems */

updateUniverse()

/* planet orbits */

for(let id in systems){

let sys = systems[id]

sys.children.forEach(obj=>{

if(obj.distance){

obj.angle += 0.01

obj.position.x = Math.cos(obj.angle)*obj.distance
obj.position.z = Math.sin(obj.angle)*obj.distance

}

})

}

renderer.render(scene,camera)

}

animate()

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
