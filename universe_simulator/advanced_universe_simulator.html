<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GPU Universe Simulator</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:6px;
}

</style>
</head>

<body>

<div id="ui">
<b>GPU Universe 🌌</b><br>
WASD = Move<br>
Shift = Warp<br>
Click = Lock Mouse<br>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene = new THREE.Scene()

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000000
)

let renderer = new THREE.WebGLRenderer({antialias:false})

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

camera.position.z = 1000

/* -------------------------
STAR FIELD GENERATION
------------------------- */

const STAR_COUNT = 1000000

let geometry = new THREE.BufferGeometry()

let positions = new Float32Array(STAR_COUNT*3)
let colors = new Float32Array(STAR_COUNT*3)

for(let i=0;i<STAR_COUNT;i++){

let r = Math.random()*50000
let angle = r*0.0008

let x = Math.cos(angle)*r
let z = Math.sin(angle)*r
let y = (Math.random()-0.5)*3000

positions[i*3] = x
positions[i*3+1] = y
positions[i*3+2] = z

let color = new THREE.Color()
color.setHSL(Math.random(),1,0.8)

colors[i*3] = color.r
colors[i*3+1] = color.g
colors[i*3+2] = color.b

}

geometry.setAttribute(
"position",
new THREE.BufferAttribute(positions,3)
)

geometry.setAttribute(
"color",
new THREE.BufferAttribute(colors,3)
)

/* -------------------------
GPU STAR SHADER
------------------------- */

let material = new THREE.ShaderMaterial({

vertexColors:true,

vertexShader:`

attribute vec3 color;
varying vec3 vColor;

void main(){

vColor=color;

vec4 mvPosition = modelViewMatrix * vec4(position,1.0);

gl_PointSize = 2.0 * (3000.0 / -mvPosition.z);

gl_Position = projectionMatrix * mvPosition;

}
`,

fragmentShader:`

varying vec3 vColor;

void main(){

float d = length(gl_PointCoord-vec2(0.5));

if(d>0.5) discard;

gl_FragColor = vec4(vColor,1.0);

}
`

})

let stars = new THREE.Points(geometry,material)

scene.add(stars)

/* -------------------------
BLACK HOLE CORE
------------------------- */

let bh = new THREE.Mesh(

new THREE.SphereGeometry(300,32,32),

new THREE.MeshBasicMaterial({color:0x000000})

)

scene.add(bh)

/* -------------------------
SPACESHIP
------------------------- */

let ship = new THREE.Object3D()

scene.add(ship)

ship.add(camera)

let warp=false
let keys={}

window.addEventListener("keydown",e=>{
keys[e.key]=true
if(e.key==="Shift") warp=true
})

window.addEventListener("keyup",e=>{
keys[e.key]=false
if(e.key==="Shift") warp=false
})

/* -------------------------
MOUSE LOOK
------------------------- */

let yaw=0
let pitch=0

document.body.addEventListener("click",()=>{
document.body.requestPointerLock()
})

document.body.addEventListener("mousemove",e=>{

if(document.pointerLockElement){

yaw -= e.movementX*0.002
pitch -= e.movementY*0.002

pitch = Math.max(-1.5,Math.min(1.5,pitch))

ship.rotation.y = yaw
camera.rotation.x = pitch

}

})

/* -------------------------
ANIMATION
------------------------- */

function animate(){

requestAnimationFrame(animate)

let speed = warp ? 200 : 20

if(keys["w"]) ship.translateZ(-speed)
if(keys["s"]) ship.translateZ(speed)
if(keys["a"]) ship.translateX(-speed)
if(keys["d"]) ship.translateX(speed)

renderer.render(scene,camera)

}

animate()

window.addEventListener("resize",()=>{

camera.aspect = window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
