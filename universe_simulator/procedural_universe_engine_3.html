<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Procedural Universe 3.0</title>
<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial;}
#ui{
position:absolute;top:10px;left:10px;color:white;
background:rgba(0,0,0,0.6);padding:10px;border-radius:6px;
}
</style>
</head>
<body>
<div id="ui">
<b>Procedural Universe 3.0 🌌</b><br>
WASD = Fly | Shift = Warp | Space = Land/Jump<br>
Click = Mouse Look
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// ====================
// Scene & Camera
// ====================
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,500000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// ====================
// Spaceship / Player
// ====================
let ship = new THREE.Object3D();
scene.add(ship);
ship.add(camera);
let keys = {};
let warp=false;
let onPlanet=false;
let currentPlanet=null;

// keyboard
window.addEventListener("keydown",e=>{keys[e.key]=true;if(e.key==="Shift") warp=true; if(e.key===" ") landOrJump();});
window.addEventListener("keyup",e=>{keys[e.key]=false;if(e.key==="Shift") warp=false;});

// mouse look
let yaw=0,pitch=0;
document.body.addEventListener("click",()=>document.body.requestPointerLock());
document.body.addEventListener("mousemove",e=>{
  if(document.pointerLockElement){
    yaw-=e.movementX*0.002; pitch-=e.movementY*0.002;
    pitch=Math.max(-1.5,Math.min(1.5,pitch));
    ship.rotation.y=yaw; camera.rotation.x=pitch;
  }
});

// ====================
// Lights
// ====================
scene.add(new THREE.AmbientLight(0xffffff,0.6));
let sunLight = new THREE.DirectionalLight(0xffffff,0.8);
sunLight.position.set(1,1,0);
scene.add(sunLight);

// ====================
// Universe
// ====================
let systems={};
const GRID_SIZE=4000;

function createSystem(id,x,z){
  let group = new THREE.Group();
  // Star
  let star = new THREE.Mesh(new THREE.SphereGeometry(30,32,32),
    new THREE.MeshBasicMaterial({color:new THREE.Color().setHSL(Math.random(),1,0.6)}));
  group.add(star);

  // Planets
  let planetCount=Math.floor(Math.random()*4)+1;
  for(let i=0;i<planetCount;i++){
    let planet = createPlanet(i);
    group.add(planet);
  }

  group.position.set(x,0,z);
  scene.add(group);
  systems[id]=group;
}

// --------------------
// Planet Creation with terrain, moons, atmosphere
// --------------------
function createPlanet(index){
  // procedural terrain
  let geo = new THREE.SphereGeometry(5+index*3,64,64);
  let mat = new THREE.MeshStandardMaterial({
    color:new THREE.Color().setHSL(Math.random(),1,0.5),
    roughness:1,
    flatShading:false,
    metalness:0
  });
  let planet = new THREE.Mesh(geo,mat);
  planet.distance = 80 + index*50;
  planet.angle = Math.random()*Math.PI*2;

  // Atmosphere
  let atmosphereGeo = new THREE.SphereGeometry(geo.parameters.radius*1.05,32,32);
  let atmosphereMat = new THREE.MeshPhongMaterial({
    color:0x44aaff, transparent:true, opacity:0.2, side:THREE.DoubleSide
  });
  let atmosphere = new THREE.Mesh(atmosphereGeo,atmosphereMat);
  planet.add(atmosphere);

  // Moons
  let moonCount=Math.floor(Math.random()*3);
  planet.moons=[];
  for(let i=0;i<moonCount;i++){
    let moonGeo = new THREE.SphereGeometry(planet.geometry.parameters.radius*0.3,16,16);
    let moonMat = new THREE.MeshStandardMaterial({color:0x888888});
    let moon = new THREE.Mesh(moonGeo,moonMat);
    moon.distance=planet.geometry.parameters.radius*2 + i*5;
    moon.angle=Math.random()*Math.PI*2;
    planet.moons.push(moon);
    planet.add(moon);
  }

  return planet;
}

// ====================
// Black Hole Gravity
// ====================
let blackHole = new THREE.Mesh(new THREE.SphereGeometry(100,32,32),
    new THREE.MeshBasicMaterial({color:0x000000}));
scene.add(blackHole);
blackHole.position.set(0,0,-5000);

function applyGravity(){
  let bhPos = blackHole.position;
  for(let id in systems){
    let sys = systems[id];
    sys.children.forEach(obj=>{
      if(obj.distance){
        let dx = bhPos.x - obj.getWorldPosition(new THREE.Vector3()).x;
        let dz = bhPos.z - obj.getWorldPosition(new THREE.Vector3()).z;
        let distSq = dx*dx+dz*dz+0.01;
        let force = 0.01 / distSq;
        obj.position.x += dx*force;
        obj.position.z += dz*force;
      }
    });
  }
}

// ====================
// Planet Landing
// ====================
function landOrJump(){
  if(onPlanet){ship.position.y+=50; onPlanet=false;}
  else{
    let nearest=null; let minDist=Infinity;
    for(let id in systems){
      let sys=systems[id];
      sys.children.forEach(obj=>{
        if(obj.distance){
          let pos=obj.getWorldPosition(new THREE.Vector3());
          let dist=ship.position.distanceTo(pos);
          if(dist<obj.distance+20){nearest=obj;minDist=dist;}
        }
      });
    }
    if(nearest){
      let pos=nearest.getWorldPosition(new THREE.Vector3());
      ship.position.set(pos.x,pos.y+6,pos.z);
      onPlanet=true; currentPlanet=nearest;
    }
  }
}

// ====================
// Universe Update
// ====================
function updateUniverse(){
  let gx=Math.floor(ship.position.x/GRID_SIZE);
  let gz=Math.floor(ship.position.z/GRID_SIZE);
  for(let x=-2;x<=2;x++){
    for(let z=-2;z<=2;z++){
      let id=(gx+x)+"_"+(gz+z);
      if(!systems[id]) createSystem(id,(gx+x)*GRID_SIZE,(gz+z)*GRID_SIZE);
    }
  }
}

// ====================
// Warp Jump between systems
// ====================
function warpToSystem(system){
  if(system){
    let pos=system.position;
    ship.position.set(pos.x,pos.y+50,pos.z+50);
  }
}

// ====================
// Animate Loop
// ====================
function animate(){
  requestAnimationFrame(animate);
  let speed = warp?300:20;
  if(!onPlanet){
    if(keys["w"]) ship.translateZ(-speed);
    if(keys["s"]) ship.translateZ(speed);
    if(keys["a"]) ship.translateX(-speed);
    if(keys["d"]) ship.translateX(speed);
  }

  updateUniverse();

  // planet orbits + moons
  for(let id in systems){
    let sys=systems[id];
    sys.children.forEach(obj=>{
      if(obj.distance){
        obj.angle+=0.01;
        obj.position.x=Math.cos(obj.angle)*obj.distance;
        obj.position.z=Math.sin(obj.angle)*obj.distance;
        if(obj.moons){
          obj.moons.forEach(moon=>{
            moon.angle+=0.02;
            moon.position.x=Math.cos(moon.angle)*moon.distance;
            moon.position.z=Math.sin(moon.angle)*moon.distance;
          });
        }
      }
    });
  }

  applyGravity();
  renderer.render(scene,camera);
}
animate();

// ====================
// Window Resize
// ====================
window.addEventListener("resize",()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>
</body>
</html>
