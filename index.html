<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ankit Yadav</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="stars"></div>

<nav class="navbar">
    <div class="nav-left">
        <a href="/">Ankit Yadav</a>
    </div>

    <div class="nav-right">
        <a href="/">Home</a>
        <a href="SomeRepo/">Some Repos</a>
    </div>
</nav>

<div class="content">
    <h1>Ankit Yadav</h1>
    <p>Drag & Drop Upload Enabled 🚀</p>
</div>

<!-- Upload Button -->
<button id="uploadBtn">⬆ Upload</button>

<!-- Modal -->
<div id="uploadModal" class="modal">

    <div class="modal-content">
        <span class="close">&times;</span>

        <h2>Upload Your Files</h2>

        <!-- Drag & Drop Area -->
        <div id="drop-zone">
            <p>Drag & drop files here</p>
            <p>or click to select</p>
            <input type="file" id="fileInput" multiple>
        </div>

        <!-- Tally fallback -->
        <iframe 
            data-tally-src="https://tally.so/r/9qOQ4G"
            loading="lazy">
        </iframe>

    </div>

</div>

<script src="https://tally.so/widgets/embed.js"></script>

<script>
const modal = document.getElementById("uploadModal");
const btn = document.getElementById("uploadBtn");
const closeBtn = document.querySelector(".close");

const dropZone = document.getElementById("drop-zone");
const fileInput = document.getElementById("fileInput");

/* Modal */
btn.onclick = () => modal.style.display = "flex";
closeBtn.onclick = () => modal.style.display = "none";

window.onclick = (e) => {
    if (e.target === modal) modal.style.display = "none";
};

/* Drag Events */
dropZone.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", () => {
    dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropZone.classList.remove("dragover");

    const files = e.dataTransfer.files;
    handleFiles(files);
});

/* Click to upload */
dropZone.onclick = () => fileInput.click();

fileInput.addEventListener("change", () => {
    handleFiles(fileInput.files);
});

/* File handler (demo only) */
function handleFiles(files) {
    alert(files.length + " file(s) selected");
    // NOTE: Tally iframe cannot be programmatically filled
    // This is just UI layer unless you build backend
}
</script>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="js/solar.js"></script>

</body>
</html>
