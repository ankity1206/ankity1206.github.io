name: Generate Sitemap

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-sitemap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate sitemap
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml

          find . -name "index.html" | while read file; do
            path=$(dirname "$file")
            
            if [ "$path" = "." ]; then
              url="https://ankity1206.github.io/"
            else
              clean_path=$(echo "$path" | sed 's|^\./||')
              url="https://ankity1206.github.io/$clean_path/"
            fi

            lastmod=$(git log -1 --format="%cI" -- "$file")

            echo "  <url>" >> sitemap.xml
            echo "    <loc>$url</loc>" >> sitemap.xml
            echo "    <lastmod>$lastmod</lastmod>" >> sitemap.xml
            echo "  </url>" >> sitemap.xml

          done

          echo '</urlset>' >> sitemap.xml

      - name: Commit sitemap
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add sitemap.xml

          git diff --cached --quiet || git commit -m "Auto-update sitemap"

          git push
