name: Generate Sitemap

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate sitemap.xml (atomic write)
        run: |
          tmpfile="sitemap-temp.xml"

          echo '<?xml version="1.0" encoding="UTF-8"?>' > $tmpfile
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> $tmpfile

          find . -name "index.html" | while read file; do
            path=$(dirname "$file")

            if [ "$path" = "." ]; then
              url="https://ankity1206.github.io/"
            else
              clean_path=$(echo "$path" | sed 's|^\./||')
              url="https://ankity1206.github.io/$clean_path/"
            fi

            lastmod=$(git log -1 --format="%cI" -- "$file")

            echo "  <url>" >> $tmpfile
            echo "    <loc>$url</loc>" >> $tmpfile
            echo "    <lastmod>$lastmod</lastmod>" >> $tmpfile
            echo "  </url>" >> $tmpfile
          done

          echo '</urlset>' >> $tmpfile

          mv $tmpfile sitemap.xml

      - name: Commit and push sitemap
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add sitemap.xml

          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "Auto-update sitemap"

          git pull --rebase origin master
          git push
