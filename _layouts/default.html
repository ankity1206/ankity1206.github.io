<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <div class="cursor-bubble"></div>

  <main>
    {{ content }}
  </main>

  <script>
    const bubble = document.querySelector('.cursor-bubble');

    // 1. Smooth Bubble Movement
    document.addEventListener('mousemove', (e) => {
      window.requestAnimationFrame(() => {
        bubble.style.left = e.clientX + 'px';
        bubble.style.top = e.clientY + 'px';
      });
    });

    // 2. Click Explosion (Emoji Spawner)
    document.addEventListener('click', (e) => {
      const emojis = ['😂', '✨', '🎈', '💀', '🍄', '🍕', '🔥', '🌈'];
      const span = document.createElement('span');
      span.innerText = emojis[Math.floor(Math.random() * emojis.length)];
      span.style.cssText = `
        position: fixed; left: ${e.clientX}px; top: ${e.clientY}px;
        pointer-events: none; font-size: 2.5rem; z-index: 10000;
        animation: explode 0.8s ease-out forwards;
      `;
      document.body.appendChild(span);
      setTimeout(() => span.remove(), 800);
    });

    // 3. Cowardly Repo Cards (Run away on hover)
    // We use a slight delay to ensure the cards are actually on the page
    setTimeout(() => {
      document.querySelectorAll('.repo-card').forEach(card => {
        card.addEventListener('mouseover', function() {
          const x = (Math.random() - 0.5) * 40; // Moves left or right
          const y = (Math.random() - 0.5) * 40; // Moves up or down
          const r = (Math.random() - 0.5) * 20; // Tilts
          this.style.transform = `translate(${x}px, ${y}px) rotate(${r}deg)`;
        });
      });
    }, 1000);
  </script>
</body>
</html>
