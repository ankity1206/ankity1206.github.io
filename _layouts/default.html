<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <div class="cursor-bubble"></div>

  <div class="search-container">
    <form action="https://www.google.com" method="GET" target="_blank">
      <input type="hidden" name="tbm" value="isch">
      <input type="hidden" name="udm" value="2">
      <input type="text" name="q" placeholder="Search images..." class="search-input" required>
      <button type="submit" class="search-button">🖼️ Search</button>
    </form>
  </div>

  <main>
    {{ content }}
  </main>

  <script>
    const bubble = document.querySelector('.cursor-bubble');

    // Smooth Mouse Tracking
    document.addEventListener('mousemove', (e) => {
      window.requestAnimationFrame(() => {
        bubble.style.left = e.clientX + 'px';
        bubble.style.top = e.clientY + 'px';
      });
    });

    // Emoji Explosion on Click
    document.addEventListener('click', (e) => {
      const emojis = ['😂', '✨', '💀', '🍄', '🍕', '🌈'];
      const span = document.createElement('span');
      span.innerText = emojis[Math.floor(Math.random() * emojis.length)];
      span.style.cssText = `
        position: fixed; left: ${e.clientX}px; top: ${e.clientY}px;
        pointer-events: none; font-size: 2.5rem; z-index: 10000;
        animation: explode 0.8s ease-out forwards;
      `;
      document.body.appendChild(span);
      setTimeout(() => span.remove(), 800);
    });

    // Make Repo Cards "Cowardly"
    setTimeout(() => {
      document.querySelectorAll('.repo-card').forEach(card => {
        card.addEventListener('mouseover', function() {
          const x = (Math.random() - 0.5) * 30;
          const y = (Math.random() - 0.5) * 30;
          this.style.transform = `translate(${x}px, ${y}px)`;
        });
      });
    }, 1000);
  </script>
</body>
</html>
