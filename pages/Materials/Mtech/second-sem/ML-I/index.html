<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ankit Yadav</title>

  <link rel="stylesheet" href="/css/style.css">

  <!-- Tally -->
  <script src="https://tally.so/widgets/embed.js"></script>
</head>

<body>

<!-- Background -->
<canvas id="bg"></canvas>

  <!-- Navbar -->
<div id="navbar" class="component"></div>

<!-- CONTENT -->
<div class="container">

  <div class="card">
    <h1>Machine Learning-I</h1>
  </div>


  <!-- ML Lectures (CARD VIEW) -->
  <div class="card-list" id="ml-table-body">
    <p>Loading...</p>
  </div>

</div>


<!-- Footer -->
  <div id="footer"></div>

  <!-- Scripts -->
<script src="/js/include.js"></script>

<!-- Feature scripts -->
<script src="/js/navbar.js"></script>
<script src="/js/background.js"></script>

<!-- JSON Loader -->
<script>
async function loadMLLectures() {
  const container = document.getElementById("ml-table-body");

  try {
    const res = await fetch("ml.json");
    const data = await res.json();

    let html = "";

    data.forEach(item => {
      const viewLink = item.raw.endsWith(".pdf")
        ? `https://docs.google.com/viewer?url=${item.raw}`
        : `https://view.officeapps.live.com/op/view.aspx?src=${item.raw}`;

      html += `
        <div class="card-item">
          <div class="card-left">
            <p>Lecture ${item.lecture}</p>
            <p>${item.topic}</p>
          </div>

          <div class="card-right">
            <a href="${viewLink}">View</a>
            <a href="${item.raw}" download>Download</a>
          </div>
        </div>
      `;
    });

    container.innerHTML = html || "<p>No data available</p>";

  } catch (err) {
    console.error("Error loading JSON:", err);
    container.innerHTML = "<p>Failed to load data</p>";
  }
}

loadMLLectures();
</script>



</body>
</html>
